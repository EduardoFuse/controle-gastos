<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl - Controle de Gastos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topo">
        <div class="container">
             <h1>FinControl</h1>
            <p>Controle simples e rápido dos seus gastos diários</p>
        </div>
    </header>

    <main class="container">
        <section class="resumo">
            <article class="card-resumo">
                <h2>Total Gasto no Mês</h2>
                <p id="totalGeral">R$ 0,00</p>
            </article>

            <article class="card-resumo">
                <h2>Quantidade de Gastos</h2>
                <p id="quantidadeGastos">0</p>
            </article>
        </section>

        <section class="conteudo">
            <section class="card formulario-card">
                <h2>Adicionar Despesa</h2>

                <form id="formGasto">
                    <div class="grupo-form">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Almoço" required>
                    </div>

                    <div class="grupo-form">
                        <label for="valor">Valor</label>
                        <input type="number" id="valor" placeholder="Ex: 35.90" step="0.01" min="0.01" required>
                    </div>

                    <div class="grupo-form">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" required>
                            <option value="">Selecione uma categoria</option>
                            <option value="Alimentação">Alimentação</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Lazer">Lazer</option>
                            <option value="Saúde">Saúde</option>
                            <option value="Moradia">Moradia</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>

                    <button type="submit" id="botaoPrincipal">Adicionar Gasto</button>
                </form>
            </section>

            <section class="card lista-card">
                <h2>Lista de Gastos</h2>

                <div class="tabela-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Descrição</th>
                                <th>Categoria</th>
                                <th>Valor</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="corpoTabela">
                            <tr>
                                <td colspan="5" class="sem-gastos">Nenhum gasto cadastrado.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
